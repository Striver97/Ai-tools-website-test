<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>AI Chat</title>

<style>

/* 整个页面 */
body{
    margin:0;
    font-family:Arial;
    background:#f5f5f5;
}

/* 聊天区域 */
#chat{
    height:90vh;
    overflow-y:auto;
    padding:20px;
}

/* 用户消息 */
.user{
    text-align:right;
    margin:10px;
}

/* AI消息 */
.ai{
    text-align:left;
    margin:10px;
}

/* 气泡 */
.bubble{
    display:inline-block;
    padding:10px 15px;
    border-radius:10px;
    max-width:60%;
}

/* 用户气泡 */
.user .bubble{
    background:#4CAF50;
    color:white;
}

/* AI气泡 */
.ai .bubble{
    background:white;
    border:1px solid #ddd;
}

/* 输入区 */
#inputArea{
    height:10vh;
    display:flex;
    padding:10px;
    background:white;
}

/* 输入框 */
#message{
    flex:1;
    padding:10px;
    font-size:16px;
}

/* 发送按钮 */
button{
    width:100px;
}

</style>

</head>

<body>

<div id="chat"></div>

<div id="inputArea">

<input id="message" placeholder="输入消息">

<button onclick="send()">发送</button>

</div>

<script>

async function send(){

    const input = document.getElementById("message")
    const text = input.value

    if(!text) return

    addMessage(text,"user")

    input.value=""

    const res = await fetch("/api/chat",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            message:text
        })
    })

    const data = await res.json()

    addMessage(data.reply,"ai")

}

function addMessage(text,type){

    const chat = document.getElementById("chat")

    const div = document.createElement("div")
    div.className = type

    const bubble = document.createElement("div")
    bubble.className="bubble"
    bubble.innerText=text

    div.appendChild(bubble)

    chat.appendChild(div)

    chat.scrollTop = chat.scrollHeight

}

</script>

</body>
</html>
